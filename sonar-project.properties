sonar.projectKey=adminsyspro_proxcenter-ui
sonar.organization=adminsyspro

# Source
sonar.sources=frontend/src
sonar.tests=frontend/src
sonar.test.inclusions=**/*.test.*,**/*.spec.*

# Exclude vendor/third-party code from analysis
sonar.exclusions=\
  frontend/public/novnc/**,\
  frontend/public/xterm/**,\
  frontend/node_modules/**,\
  frontend/.next/**

# Exclude generated/vendor from duplication detection
sonar.cpd.exclusions=\
  frontend/public/novnc/**,\
  frontend/public/xterm/**,\
  frontend/src/messages/**

# Disable props validation rule (not relevant with modern JSX/TypeScript)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
